name: kiddie_chess
description: A kid-friendly chess game with special abilities
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  web_socket_channel: ^2.4.0
  provider: ^6.1.1
  shared_preferences: ^2.2.2
  json_annotation: ^4.8.1
  uuid: ^4.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.7
  json_serializable: ^6.7.1
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: "assets/images/characters/gnom.png"
  adaptive_icon_background: "#1a1a2e"
  adaptive_icon_foreground: "assets/images/characters/gnom.png"
  macos:
    generate: true
    image_path: "assets/images/characters/gnom.png"
  web:
    generate: true
    image_path: "assets/images/characters/gnom.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/characters/
    - assets/images/ui/
    - assets/images/ui/combat/
    - assets/images/adventure/
    - assets/audio/
    - assets/maps/
