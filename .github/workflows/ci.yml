name: CI

# Runs the test suite and a production build on pull requests, so regressions
# are caught before they merge. Deploys stay in pages.yml (push to main only).

on:
  pull_request:
    paths:
      - 'web/**'
      - '.github/workflows/ci.yml'

permissions:
  contents: read

jobs:
  test-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - run: npm ci
        working-directory: web

      - run: npm run lint
        working-directory: web

      - run: npm run format:check
        working-directory: web

      - run: npm test
        working-directory: web

      - run: npm run build
        working-directory: web
