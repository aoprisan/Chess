name: Deploy PWA to GitHub Pages

# Builds the standalone TypeScript Adventure PWA in web/ and deploys it with the
# official GitHub Actions Pages pipeline (actions/upload-pages-artifact +
# actions/deploy-pages). GitHub Pages serves the uploaded artifact directly.
# One-time setup: repo Settings -> Pages -> Source = "GitHub Actions".
#
# The site serves at https://<user>.github.io/Chess/ so the Vite base path is
# /Chess/ (see web/vite.config.ts).

on:
  push:
    branches: [main]
    paths:
      - 'web/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - run: npm ci
        working-directory: web

      - run: npm test
        working-directory: web

      - run: npm run build
        working-directory: web

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
