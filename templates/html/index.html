<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <meta name="description" content="">
        <title>Chess</title>
        <link rel="shortcut icon" href="favicon.ico">
        <link href="assets/dist/css/bootstrap.min.css" rel="stylesheet">
        <link href="css/custom.css" rel="stylesheet">
    </head>
<body>

<main>
    <div class="wrapper">
        <div class="layout">
             <div class="header">
                 <div class="choose-hero">
                     <div class="player-bg">Player 2</div>
                     <div class="choose-hero-title">Choose your hero</div>
                 </div>
             </div>
            <div class="d-flex hero-layout">
                <div class="d-flex hero-grid">
                    <div class="hero-item">
                        <img src="image/char/sloth.png" />
                        <div class="hero-item-title">
                            <span>Sloth</span>
                        </div>
                    </div>
                    <div class="hero-item">
                        <img src="image/char/panda.png" />
                        <div class="hero-item-title">
                            <span>Panda</span>
                        </div>
                    </div>
                    <div class="hero-item">
                        <img src="image/char/unicorn.png" />
                        <div class="hero-item-title">
                            <span>Unicorn</span>
                        </div>
                    </div>
                    <div class="hero-item active">
                        <img src="image/char/snowman.png" />
                        <div class="hero-item-title">
                            <span>Snowman</span>
                        </div>
                    </div>
                    <div class="hero-item">
                        <img src="image/char/gnom.png" />
                        <div class="hero-item-title">
                            <span>Gnom</span>
                        </div>
                    </div>
                    <div class="hero-item">
                        <img src="image/char/yeti.png" />
                        <div class="hero-item-title">
                            <span>Yeti</span>
                        </div>
                    </div>
                </div>
                <div class="d-flex hero-details-layout">
                    <div class="d-flex hero-details">
                        <div class="d-flex hero-big">
                            <img src="image/char/snowman.png" />
                            <div class="hero-item-title">
                                <span>Snowman</span>
                            </div>
                        </div>
                        <div class="perks">
                            <span>Perks</span>
                            <div class="d-flex perk-item">
                                <div>Another move</div>
                                <div class="active"></div>
                            </div>
                            <div class="d-flex perk-item">
                                <div>Remove enemy</div>
                                <div class="active"></div>
                            </div>
                            <div class="d-flex perk-item">
                                <div>Place another</div>
                                <div class="active"></div>
                            </div>
                            <div class="d-flex perk-item">
                                <div>Scatter around</div>
                                <div class="active"></div>
                            </div>
                            <div class="d-flex perk-item">
                                <div>Freeze</div>
                                <div class="active"></div>
                            </div>
                            <div class="d-flex perk-item">
                                <div>Cancel move</div>
                                <div class="active"></div>
                            </div>
                            <div class="d-flex mode">
                                <div class="checkbox"><img src="image/checkbox-active-bg.png" /></div>
                                <div>AI Mode</div>
                            </div>
                            <div class="d-flex mode-level">
                                <div>Easy</div>
                                <div>Medium</div>
                                <div class="active-hard">Hard</div>
                            </div>
                        </div>
                    </div>
                    <div class="d-flex controls">
                        <div class="back">
                            <button>Back to menu</button>
                        </div>
                        <div class="continue">
                            <button>Continue</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>
    <script src="assets/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
